name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wasm:
    name: Build wasm artifacts
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.WASM_IMAGE == ''
    # Fallback for the bootstrap period before the GHCR image is published.
    # This expects a self-hosted runner with the wasm/TeX toolchain installed.
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: make all

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: wasm-dist
          path: |
            dist/
            docs/
          if-no-files-found: error

  build-wasm-ghcr:
    name: Build wasm artifacts from GHCR image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.WASM_IMAGE != ''
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.WASM_IMAGE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: make all

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: wasm-dist
          path: |
            dist/
            docs/
          if-no-files-found: error

  build-linux:
    name: Build native compiler
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Haskell
        uses: haskell-actions/setup@v2.11.0
        with:
          ghc-version: 9.6.7
          cabal-version: 3.14.2.0

      - name: Build compiler
        run: |
          set -euo pipefail
          cabal build compiler
          mkdir -p bindist
          bin_path="$(cabal list-bin compiler)"
          cp "$bin_path" ./bindist/

      - name: Upload bindist
        uses: actions/upload-artifact@v4
        with:
          name: linux-bindist
          path: bindist/
          if-no-files-found: error
