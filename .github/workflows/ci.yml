name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Override this repository variable if you publish the image under another tag.
  # Expected example: ghcr.io/tfc-far-horizon/patchouli-markdown:ghcr
  CI_IMAGE: ${{ vars.WASM_IMAGE || 'ghcr.io/tfc-far-horizon/igem-markdown-ci' }}
  GHC_NATIVE_VERSION: "9.12.2"

jobs:
  build-wasm:
    name: Build wasm artifacts
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.WASM_IMAGE || 'ghcr.io/tfc-far-horizon/igem-markdown-ci'  }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # - name: Configure wasm Cabal project
      #   run: |
      #     set -euo pipefail

      #     if [[ -f cabal.project ]]; then
      #       cat > cabal.project.local <<'EOF'
      #     shared: True

      #     package jsaddle-wasm
      #       flags: -eval-via-jsffi
      #     EOF
      #     else
      #       cat > cabal.project <<'EOF'
      #     packages: .
      #     shared: True

      #     package jsaddle-wasm
      #       flags: -eval-via-jsffi
      #     EOF
      #     fi

      - name: Build wasm artifacts and docs
        run: |
          set -euo pipefail
          with-ghc-wasm-env bash -lc '
            set -euo pipefail
            make all
          '

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: wasm-dist
          path: |
            dist/
            docs/
          if-no-files-found: error

  build-linux:
    name: Build native compiler
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.WASM_IMAGE || 'ghcr.io/tfc-far-horizon/igem-markdown-ci'  }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select native GHC
        run: |
          set -euo pipefail
          ghcup set ghc "${GHC_NATIVE_VERSION}"
          ghc --version
          cabal --version

      - name: Build compiler
        run: |
          set -euo pipefail
          cabal build compiler
          mkdir -p bindist
          bin_path="$(cabal list-bin compiler)"
          cp "$bin_path" ./bindist/

      - name: Upload bindist
        uses: actions/upload-artifact@v4
        with:
          name: linux-bindist
          path: bindist/
          if-no-files-found: error
