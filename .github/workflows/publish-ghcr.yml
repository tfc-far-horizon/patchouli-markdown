name: Publish GHCR image

on:
  push:
    branches:
      - main
      - ghcr
    paths:
      - Dockerfile
      - .github/workflows/publish-ghcr.yml

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/igem-markdown-ci:latest
            ghcr.io/${{ github.repository_owner }}/igem-markdown-ci:${{ github.sha }}
          build-args: |
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
